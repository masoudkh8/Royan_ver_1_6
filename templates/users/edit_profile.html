<!-- templates/users/edit_profile.html -->
{% extends "base_pwa.html" %}

{% block title %}ویرایش پروفایل{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-xl shadow-lg mt-8 border border-gray-200">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">✏️ ویرایش پروفایل</h2>

    <form method="POST" class="space-y-5">
        <!-- نام شرکت -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">نام شرکت</label>
            <input type="text" name="company" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" value="{{ user.company_name or '' }}" placeholder="شرکت صادراتی آرمان">
        </div>

        <!-- کشور -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">کشور</label>
            <input type="text" name="country" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" value="{{ user.country or '' }}" placeholder="ایران">
        </div>

        <!-- تلفن -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">تلفن</label>
            <input type="text" name="phone" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition" value="{{ user.phone or '' }}" placeholder="+98 912 345 6789">
        </div>

        <!-- دکمه‌ها -->
        <div class="flex gap-3 pt-4">
            <button type="submit" class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-6 rounded-lg shadow transition transform hover:scale-105">
                ذخیره تغییرات
            </button>
            <a href="{{ url_for('users.profile') }}" class="px-6 py-3 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition">
                بازگشت
            </a>
        </div>
    </form>
</div>
{% endblock %}
