<!-- templates/users/notifications.html -->
{% extends "base_pwa.html" %}

{% block title %}اعلان‌ها{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

    <!-- هدر -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
<!--            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 ml-2 text-orange-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">-->
<!--                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-5 5v-5zM12 19c0 1.1.9 2 2 2s2-.9 2-2h-4z" />-->
<!--                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 21v-8a4 4 0 00-4-4H7a4 4 0 00-4 4v8M7 15v-2a4 4 0 014-4h2a4 4 0 014 4v2" />-->
<!--            </svg>-->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0M3.124 7.5A8.969 8.969 0 0 1 5.292 3m13.416 0a8.969 8.969 0 0 1 2.168 4.5" />
            </svg>

            اعلان‌ها
        </h2>
        <a href="{{ url_for('users.profile') }}" class="text-sm text-blue-600 hover:text-blue-800 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            بازگشت
        </a>
    </div>

    {% if notifications %}
        <div class="space-y-3">
            {% for n in notifications %}
            <div class="p-4 rounded-lg border
                {% if n.is_read %}
                    border-gray-200 bg-white
                {% else %}
                    border-blue-300 bg-blue-50 shadow-inner
                {% endif %}
                transition hover:shadow">
                <p class="text-gray-800">{{ n.message }}</p>
                <p class="text-xs text-gray-500 mt-1">{{ n.created_at.strftime('%d/%m/%Y %H:%M') }}</p>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="text-center py-10 text-gray-500 bg-gray-50 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-5 5v-5zM12 19c0 1.1.9 2 2 2s2-.9 2-2h-4z" />
            </svg>
            هیچ اعلانی وجود ندارد.
        </div>
    {% endif %}
</div>
{% endblock %}
