<!-- templates/users/place_order.html -->
{% extends "base_pwa.html" %}

{% block title %}{{ _('Place New Order') }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-6 mb-20">

  <!-- دکمه Back -->
    <a href="{{ url_for('users.profile') }}"  class="inline-flex items-center text-sm text-blue-600 hover:text-blue-800 mb-4 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        {{ _('Back to Profile') }}
    </a>


    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">{{ _('📝 Place New Order') }}</h1>
        <p class="text-gray-600">{{ _('Complete your export or import order') }}</p>
    </div>

    <form method="POST" action="{{ url_for('users.place_order') }}" class="space-y-6">

        <!-- Product و کمیت -->
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">{{ _('Product') }}</label>
                <select name="product" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    <option value="">{{ _('Select...') }}</option>
                    <option value="wheat">{{ _('Wheat') }}</option>
                    <option value="rice">{{ _('Rice') }}</option>
                    <option value="sugar">{{ _('Sugar') }}</option>
                    <option value="corn">{{ _('Corn') }}</option>
                    <option value="steel">{{ _('Steel') }}</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">{{ _('Quantity (Tons)') }}</label>
                <input type="number" name="quantity" required min="1" step="0.1"
                       class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>

        <!-- Price -->
        <div>
            <label class="block text-sm font-medium text-gray-700">{{ _('Price per Ton (USD)') }}</label>
            <input type="number" name="price" required min="10" step="5"
                   class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
        </div>

        <!-- پورت مبدأ و Destination -->
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">{{ _('Origin Port') }}</label>
                <input type="text" name="origin_port" placeholder="{{ _('e.g. Bandar Abbas') }}"
                       class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">{{ _('Destination Port') }}</label>
                <input type="text" name="destination_port" placeholder="{{ _('e.g. Jeddah') }}"
                       class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>
        <div>
            <label>{{ _('Seller') }}</label>
            <select name="seller_id" required class="form-control">
                <option value="">{{ _('Select...') }}</option>
                {% for seller in sellers %}
                    <option value="{{ seller.id }}">{{ seller.username }} ({{ seller.company_name or '-' }})</option>
                {% endfor %}
            </select>
        </div>
        <!-- Notes Optional -->
        <div>
            <label class="block text-sm font-medium text-gray-700">{{ _('Notes (Optional)') }}</label>
            <textarea name="notes" rows="3"
                      class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                      placeholder="{{ _('Payment terms, packaging, ...') }}"></textarea>
        </div>

        <!-- دکمه Send -->
        <div class="pt-4">
            <button type="submit"
                    class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform hover:scale-105 transition duration-200 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                {{ _('Place Order') }}
            </button>

        </div>
    </form>


</div>
{% endblock %}
