<!-- templates/users/place_order.html -->
{% extends "base_pwa.html" %}

{% block title %}ثبت سفارش جدید{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-6 mb-20">

  <!-- دکمه بازگشت -->
    <a href="{{ url_for('users.profile') }}"  class="inline-flex items-center text-sm text-blue-600 hover:text-blue-800 mb-4 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        بازگشت به پروفایل
    </a>


    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">📝 ثبت سفارش جدید</h1>
        <p class="text-gray-600">سفارش خود را برای صادرات یا واردات تکمیل کنید</p>
    </div>

    <form method="POST" action="{{ url_for('users.place_order') }}" class="space-y-6">

        <!-- محصول و کمیت -->
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">محصول</label>
                <select name="product" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    <option value="">انتخاب کنید...</option>
                    <option value="wheat">گندم</option>
                    <option value="rice">برنج</option>
                    <option value="sugar">قند</option>
                    <option value="corn">ذرت</option>
                    <option value="steel">فولاد</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">کمیت (تن)</label>
                <input type="number" name="quantity" required min="1" step="0.1"
                       class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>

        <!-- قیمت -->
        <div>
            <label class="block text-sm font-medium text-gray-700">قیمت هر تن (دلار)</label>
            <input type="number" name="price" required min="10" step="5"
                   class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
        </div>

        <!-- پورت مبدأ و مقصد -->
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">پورت مبدأ</label>
                <input type="text" name="origin_port" placeholder="مثلاً بندرعباس"
                       class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">پورت مقصد</label>
                <input type="text" name="destination_port" placeholder="مثلاً جده"
                       class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>
        <div>
            <label>فروشنده</label>
            <select name="seller_id" required class="form-control">
                <option value="">انتخاب کنید...</option>
                {% for seller in sellers %}
                    <option value="{{ seller.id }}">{{ seller.username }} ({{ seller.company_name or '-' }})</option>
                {% endfor %}
            </select>
        </div>
        <!-- توضیحات اختیاری -->
        <div>
            <label class="block text-sm font-medium text-gray-700">توضیحات (اختیاری)</label>
            <textarea name="notes" rows="3"
                      class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                      placeholder="شرایط پرداخت، بسته‌بندی، ..."></textarea>
        </div>

        <!-- دکمه ارسال -->
        <div class="pt-4">
            <button type="submit"
                    class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform hover:scale-105 transition duration-200 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                ثبت سفارش
            </button>

        </div>
    </form>


</div>
{% endblock %}
