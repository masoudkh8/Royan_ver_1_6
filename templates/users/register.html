<!-- templates/users/register.html -->
{% extends "base_pwa.html" %}

{% block title %}ثبت نام{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-xl shadow-lg mt-8 border border-gray-200">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">📝 ثبت نام در مارکت</h2>

    <form method="POST" class="space-y-5">
        <!-- نام کاربری -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">نام کاربری</label>
            <input type="text" name="username" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="مثلاً: ali_export" required>
        </div>

        <!-- ایمیل -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ایمیل</label>
            <input type="email" name="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="ali@example.com" required>
        </div>

        <!-- رمز عبور -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">رمز عبور</label>
            <input type="password" name="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
        </div>

        <!-- نقش -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">نقش شما</label>
            <select name="role" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
                <option value="">انتخاب کنید...</option>
                <option value="buyer">خریدار</option>
                <option value="seller">فروشنده</option>
                <option value="broker">بروکر</option>
            </select>
        </div>

        <!-- نام شرکت -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">نام شرکت (اختیاری)</label>
            <input type="text" name="company" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="شرکت صادراتی آرمان">
        </div>

        <!-- کشور -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">کشور</label>
            <input type="text" name="country" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="ایران">
        </div>

        <!-- تلفن -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">تلفن (اختیاری)</label>
            <input type="text" name="phone" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="+98 912 345 6789">
        </div>

        <!-- دکمه ثبت نام -->
        <div class="pt-2">
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-bold py-3 px-6 rounded-lg shadow transition transform hover:scale-105 focus:outline-none">
                ثبت نام
            </button>
        </div>
    </form>

    <!-- لینک ورود -->
    <p class="text-center text-sm text-gray-600 mt-6">
        حساب دارید؟
        <a href="{{ url_for('users.login') }}" class="font-medium text-blue-600 hover:text-blue-500 transition">
            وارد شوید
        </a>
    </p>
</div>
{% endblock %}
