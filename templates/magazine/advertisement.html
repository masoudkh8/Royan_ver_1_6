<!-- templates/magazine/advertisement.html -->
{% extends "base_pwa.html" %}

{% block title %}درخواست تبلیغات - مجله تصویر{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 dark:from-gray-900 dark:to-gray-800 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <!-- هدر -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-4">
                درخواست تبلیغات در مجله تصویر
            </h1>
            <p class="text-lg text-gray-600 dark:text-gray-300">
                برای ثبت تبلیغ در مجله، فرم زیر را تکمیل کنید
            </p>
        </div>

        <!-- فرم -->
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-8">
            <form method="POST" action="{{ url_for('magazine.advertisement_request') }}" class="space-y-6">
                <!-- نام و نام خانوادگی -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        نام و نام خانوادگی <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="name" name="name" required
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition-all">
                </div>

                <!-- نام شرکت -->
                <div>
                    <label for="company" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        نام شرکت / برند
                    </label>
                    <input type="text" id="company" name="company"
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition-all">
                </div>

                <!-- ایمیل -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        ایمیل <span class="text-red-500">*</span>
                    </label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition-all">
                </div>

                <!-- تلفن -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        شماره تلفن <span class="text-red-500">*</span>
                    </label>
                    <input type="tel" id="phone" name="phone" required
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition-all">
                </div>

                <!-- نوع تبلیغ -->
                <div>
                    <label for="ad_type" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        نوع تبلیغ <span class="text-red-500">*</span>
                    </label>
                    <select id="ad_type" name="ad_type" required
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition-all">
                        <option value="">انتخاب کنید...</option>
                        <option value="full_page">صفحه کامل</option>
                        <option value="half_page">نیم صفحه</option>
                        <option value="quarter_page">ربع صفحه</option>
                        <option value="back_cover">جلد پشتی</option>
                        <option value="inside_cover">جلد داخلی</option>
                        <option value="banner">بنر تبلیغاتی</option>
                    </select>
                </div>

                <!-- اندازه -->
                <div>
                    <label for="size" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        اندازه تبلیغ
                    </label>
                    <input type="text" id="size" name="size" placeholder="مثال: 21x29 سانتی‌متر"
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition-all">
                </div>

                <!-- مدت زمان -->
                <div>
                    <label for="duration" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        مدت زمان انتشار
                    </label>
                    <select id="duration" name="duration"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition-all">
                        <option value="">انتخاب کنید...</option>
                        <option value="one_issue">یک شماره</option>
                        <option value="three_issues">سه شماره</option>
                        <option value="six_issues">شش شماره</option>
                        <option value="annual">سالیانه (۱۲ شماره)</option>
                    </select>
                </div>

                <!-- پیام -->
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        پیام و توضیحات
                    </label>
                    <textarea id="message" name="message" rows="5"
                              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:text-white transition-all"></textarea>
                </div>

                <!-- دکمه ارسال -->
                <button type="submit"
                        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white py-4 rounded-lg font-bold text-lg transition-all transform hover:scale-105 shadow-lg">
                    ثبت درخواست تبلیغات
                </button>
            </form>

            <!-- بازگشت -->
            <div class="mt-6 text-center">
                <a href="{{ url_for('magazine.index') }}" 
                   class="text-purple-600 dark:text-purple-400 hover:text-purple-800 dark:hover:text-purple-300 font-medium">
                    ← بازگشت به صفحه اصلی مجله
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
