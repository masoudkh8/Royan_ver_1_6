<!-- templates/admin/dashboard.html -->
{% extends "base_pwa.html" %}

{% block title %}داشبورد ادمین{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto mt-8 p-6 bg-white rounded-xl shadow">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">📊 داشبورد مدیریت</h2>

    <!-- آمار -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="p-6 bg-blue-50 rounded-lg text-center border border-blue-100">
            <h3 class="text-lg font-semibold text-blue-800">کل کاربران</h3>
            <p class="text-3xl font-bold text-blue-600">{{ total_users }}</p>
        </div>

        <div class="p-6 bg-green-50 rounded-lg text-center border border-green-100">
            <h3 class="text-lg font-semibold text-green-800">درخواست‌های ویژه</h3>
            <p class="text-3xl font-bold text-green-600">{{ premium_requests }}</p>
        </div>

        <div class="p-6 bg-yellow-50 rounded-lg text-center border border-yellow-100">
            <h3 class="text-lg font-semibold text-yellow-800">در انتظار بررسی</h3>
            <p class="text-3xl font-bold text-yellow-600">{{ pending_requests }}</p>
        </div>
    </div>

    <!-- لینک‌های سریع -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <a href="{{ url_for('admin.manage_users') }}" class="block p-4 bg-gray-100 hover:bg-gray-200 rounded-lg text-center font-semibold transition">
            🔧 مدیریت کاربران
        </a>
        <a href="{{ url_for('admin.premium_requests') }}" class="block p-4 bg-gray-100 hover:bg-gray-200 rounded-lg text-center font-semibold transition">
            📂 درخواست‌های ارتقاء به ویژه
        </a>
    </div>
</div>
{% endblock %}
